    <!-- ===== JAVASCRIPT ===== -->
    <script>
        (function() {
            'use strict';

            // ─── Particle System ─────────────────────────────────────────
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animationId = null;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function createParticles(count) {
                particles = [];
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.4,
                        vy: (Math.random() - 0.5) * 0.4,
                        size: Math.random() * 2.5 + 0.5,
                        opacity: Math.random() * 0.35 + 0.05,
                        hue: Math.random() > 0.5 ? 260 : 330
                    });
                }
            }

            function drawParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Draw connections between nearby particles
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(124, 92, 255, ${0.06 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }

                // Draw particles
                particles.forEach(function(p) {
                    p.x += p.vx;
                    p.y += p.vy;

                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${p.opacity})`;
                    ctx.fill();
                });

                animationId = requestAnimationFrame(drawParticles);
            }

            function initParticles() {
                resizeCanvas();
                createParticles(50);
                drawParticles();
            }

            initParticles();

            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(function() {
                    resizeCanvas();
                    createParticles(50);
                }, 200);
            });

            // ─── Ripple Effect on Link Cards ────────────────────────────
            document.querySelectorAll('.link-card').forEach(function(card) {
                card.addEventListener('click', function(e) {
                    const rect = this.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    const x = e.clientX - rect.left - size / 2;
                    const y = e.clientY - rect.top - size / 2;

                    const ripple = document.createElement('span');
                    ripple.className = 'ripple';
                    ripple.style.cssText =
                        'position:absolute;width:' + size + 'px;height:' + size + 'px;' +
                        'left:' + x + 'px;top:' + y + 'px;' +
                        'border-radius:50%;background:rgba(255,255,255,0.12);' +
                        'transform:scale(0);animation:rippleAnim 0.6s ease-out;' +
                        'pointer-events:none;z-index:0;';
                    this.appendChild(ripple);
                    setTimeout(function() { ripple.remove(); }, 600);
                });
            });

            // ─── Inject Ripple Keyframes ────────────────────────────────
            const styleSheet = document.createElement('style');
            styleSheet.textContent =
                '@keyframes rippleAnim { to { transform: scale(2.5); opacity: 0; } }';
            document.head.appendChild(styleSheet);

            // ─── Avatar Ring Pulse ──────────────────────────────────────
            const ring = document.querySelector('.avatar-ring');
            if (ring) {
                setInterval(function() {
                    ring.style.transform = 'scale(1.05)';
                    setTimeout(function() {
                        ring.style.transform = 'scale(1)';
                    }, 300);
                }, 3000);
            }

        })();
    </script>
